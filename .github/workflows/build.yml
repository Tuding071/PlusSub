name: Build PlusSub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate complete Android project
        run: |
          # Create all directories
          mkdir -p app/src/main/java/com/plussub
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper
          
          # Copy your KT file
          cp MainActivity.kt app/src/main/java/com/plussub/MainActivity.kt
          
          # Generate activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="16dp">
              
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="PlusSub"
                  android:textSize="28sp"
                  android:textColor="#2196F3"
                  android:layout_gravity="center_horizontal"/>
              
              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Load a song"
                  android:padding="12dp"
                  android:background="#F0F0F0"
                  android:layout_marginTop="16dp"/>
              
              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="200dp"
                  android:layout_marginTop="16dp">
                  <LinearLayout
                      android:id="@+id/gridContainer"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"/>
              </ScrollView>
              
              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="SUB BASS"
                  android:textColor="#2196F3"
                  android:layout_marginTop="16dp"/>
              
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#F0F0F0"
                  android:padding="12dp"
                  android:layout_marginTop="8dp">
                  <TextView android:text="Octave:" android:layout_width="80dp" android:layout_height="wrap_content"/>
                  <Spinner android:id="@+id/octaveSpinner" android:layout_width="0dp" android:layout_height="40dp" android:layout_weight="1"/>
              </LinearLayout>
              
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#F0F0F0"
                  android:padding="12dp"
                  android:layout_marginTop="2dp">
                  <TextView android:text="Volume:" android:layout_width="80dp" android:layout_height="wrap_content"/>
                  <SeekBar android:id="@+id/volumeSeekBar" android:layout_width="0dp" android:layout_height="wrap_content" android:layout_weight="1" android:max="100" android:progress="70"/>
                  <TextView android:id="@+id/volumeValue" android:layout_width="40dp" android:layout_height="wrap_content" android:text="70%"/>
              </LinearLayout>
              
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginTop="20dp">
                  <Button android:id="@+id/loadBtn" android:layout_width="0dp" android:layout_height="50dp" android:layout_weight="1" android:text="LOAD" android:backgroundTint="#2196F3" android:layout_marginRight="4dp"/>
                  <Button android:id="@+id/playBtn" android:layout_width="0dp" android:layout_height="50dp" android:layout_weight="1" android:text="PLAY" android:backgroundTint="#4CAF50" android:layout_marginLeft="4dp" android:layout_marginRight="4dp"/>
                  <Button android:id="@+id/saveBtn" android:layout_width="0dp" android:layout_height="50dp" android:layout_weight="1" android:text="SAVE" android:backgroundTint="#F44336" android:layout_marginLeft="4dp"/>
              </LinearLayout>
          </LinearLayout>
          EOF
          
          # Generate strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">PlusSub</string>
              <string-array name="octave_options">
                  <item>-2 oct</item>
                  <item>-1 oct</item>
                  <item>Normal</item>
              </string-array>
          </resources>
          EOF
          
          # Generate AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.plussub">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="PlusSub"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Generate blue icon
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          
          # Generate settings.gradle - FIXED SYNTAX
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PlusSub"
          include ':app'
          EOF
          
          # Generate build.gradle (project)
          cat > build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.20'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          EOF
          
          # Generate app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          
          android {
              namespace 'com.plussub'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.plussub"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF
          
          # Generate gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF
          
          # Generate gradle wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Download gradle-wrapper.jar
          wget -q -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          
          # Create gradlew
          echo '#!/bin/sh
          DIR="$(cd "$(dirname "$0")" && pwd)"
          java -classpath "$DIR/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          
          # Create empty proguard file
          touch app/proguard-rules.pro

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlusSub
          path: app/build/outputs/apk/debug/*.apk
