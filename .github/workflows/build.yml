name: Build PlusSub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android project
        run: |
          # Create structure
          mkdir -p app/src/main/java/com/plussub
          mkdir -p app/src/main/res/values
          
          # Copy MainActivity
          cp MainActivity.kt app/src/main/java/com/plussub/MainActivity.kt
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.plussub">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application android:icon="@mipmap/ic_launcher" android:label="PlusSub">
                  <activity android:name=".MainActivity" android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources><string name="app_name">PlusSub</string></resources>
          EOF
          
          # Create simple blue icon (base64 1x1 blue pixel)
          echo "iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg==" | base64 -d > app/src/main/res/ic_launcher.png
          
          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories { google() mavenCentral() gradlePluginPortal() }
          }
          dependencyResolutionManagement {
              repositories { google() mavenCentral() }
          }
          rootProject.name = "PlusSub"
          include ':app'
          EOF
          
          # Project build.gradle
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          EOF
          
          # App build.gradle - FIXED VERSIONS
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          
          android {
              namespace 'com.plussub'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.plussub"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildFeatures {
                  compose true
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          
          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          EOF

      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlusSub
          path: app/build/outputs/apk/debug/*.apk
