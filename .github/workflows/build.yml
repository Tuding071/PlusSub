name: Build PlusSub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Generate complete Android project
        run: |
          # Create all directories
          mkdir -p app/src/main/java/com/plussub
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper
          
          # Copy your KT file
          cp MainActivity.kt app/src/main/java/com/plussub/MainActivity.kt
          
          # Generate activity_main.xml (COMPLETE LAYOUT)
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="16dp"
              android:background="#FFFFFF"
              android:showDividers="middle"
              android:divider="?android:dividerHorizontal">

              <!-- Header -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginBottom="16dp">

                  <TextView
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="PlusSub"
                      android:textSize="32sp"
                      android:textColor="#2196F3"
                      android:textStyle="bold"/>

                  <TextView
                      android:id="@+id/songNameText"
                      android:layout_width="wrap_content"
                      android:layout_height="wrap_content"
                      android:text="No song"
                      android:textSize="14sp"
                      android:maxLines="1"
                      android:ellipsize="end"/>
              </LinearLayout>

              <!-- Status -->
              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Load a song to start"
                  android:padding="12dp"
                  android:background="#F0F0F0"
                  android:layout_marginBottom="16dp"/>

              <!-- FL Studio Grid -->
              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="BAR GRID"
                  android:textColor="#2196F3"
                  android:textSize="12sp"
                  android:layout_marginBottom="4dp"/>

              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="200dp"
                  android:background="#F5F5F5"
                  android:padding="4dp"
                  android:scrollbars="vertical">

                  <LinearLayout
                      android:id="@+id/gridContainer"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"/>
              </ScrollView>

              <!-- Sub Bass Section -->
              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="SUB BASS"
                  android:textColor="#2196F3"
                  android:textSize="12sp"
                  android:layout_marginTop="16dp"
                  android:layout_marginBottom="8dp"/>

              <!-- Octave Control -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#F0F0F0"
                  android:padding="12dp"
                  android:layout_marginBottom="2dp">

                  <TextView
                      android:layout_width="80dp"
                      android:layout_height="wrap_content"
                      android:text="Octave:"
                      android:textSize="14sp"
                      android:gravity="center_vertical"/>

                  <Spinner
                      android:id="@+id/octaveSpinner"
                      android:layout_width="0dp"
                      android:layout_height="40dp"
                      android:layout_weight="1"
                      android:background="@android:drawable/btn_dropdown"
                      android:spinnerMode="dropdown"/>
              </LinearLayout>

              <!-- Volume Control -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#F0F0F0"
                  android:padding="12dp"
                  android:layout_marginBottom="2dp">

                  <TextView
                      android:layout_width="80dp"
                      android:layout_height="wrap_content"
                      android:text="Volume:"
                      android:textSize="14sp"
                      android:gravity="center_vertical"/>

                  <SeekBar
                      android:id="@+id/volumeSeekBar"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:max="100"
                      android:progress="70"/>

                  <TextView
                      android:id="@+id/volumeValue"
                      android:layout_width="40dp"
                      android:layout_height="wrap_content"
                      android:text="70%"
                      android:textSize="14sp"
                      android:gravity="center"/>
              </LinearLayout>

              <!-- EQ Section -->
              <TextView
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="EQ (SONG ONLY)"
                  android:textColor="#FF9800"
                  android:textSize="12sp"
                  android:layout_marginTop="16dp"
                  android:layout_marginBottom="8dp"/>

              <!-- Bass EQ -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#F0F0F0"
                  android:padding="12dp"
                  android:layout_marginBottom="2dp">

                  <TextView
                      android:layout_width="60dp"
                      android:layout_height="wrap_content"
                      android:text="Bass:"
                      android:textSize="14sp"
                      android:gravity="center_vertical"/>

                  <SeekBar
                      android:id="@+id/bassSeekBar"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:max="100"
                      android:progress="50"/>
              </LinearLayout>

              <!-- Mid EQ -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#F0F0F0"
                  android:padding="12dp"
                  android:layout_marginBottom="2dp">

                  <TextView
                      android:layout_width="60dp"
                      android:layout_height="wrap_content"
                      android:text="Mid:"
                      android:textSize="14sp"
                      android:gravity="center_vertical"/>

                  <SeekBar
                      android:id="@+id/midSeekBar"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:max="100"
                      android:progress="50"/>
              </LinearLayout>

              <!-- Treble EQ -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:background="#F0F0F0"
                  android:padding="12dp"
                  android:layout_marginBottom="2dp">

                  <TextView
                      android:layout_width="60dp"
                      android:layout_height="wrap_content"
                      android:text="Treble:"
                      android:textSize="14sp"
                      android:gravity="center_vertical"/>

                  <SeekBar
                      android:id="@+id/trebleSeekBar"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:max="100"
                      android:progress="50"/>
              </LinearLayout>

              <!-- Control Buttons -->
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginTop="20dp">

                  <Button
                      android:id="@+id/loadBtn"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="LOAD"
                      android:backgroundTint="#2196F3"
                      android:layout_marginRight="4dp"
                      android:textColor="#FFFFFF"
                      android:textStyle="bold"/>

                  <Button
                      android:id="@+id/playBtn"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="PLAY"
                      android:backgroundTint="#4CAF50"
                      android:layout_marginLeft="4dp"
                      android:layout_marginRight="4dp"
                      android:textColor="#FFFFFF"
                      android:textStyle="bold"/>

                  <Button
                      android:id="@+id/saveBtn"
                      android:layout_width="0dp"
                      android:layout_height="50dp"
                      android:layout_weight="1"
                      android:text="SAVE"
                      android:backgroundTint="#F44336"
                      android:layout_marginLeft="4dp"
                      android:textColor="#FFFFFF"
                      android:textStyle="bold"/>
              </LinearLayout>

          </LinearLayout>
          EOF
          
          # Generate strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">PlusSub</string>
              <string-array name="octave_options">
                  <item>-2 oct</item>
                  <item>-1 oct</item>
                  <item>Normal</item>
              </string-array>
          </resources>
          EOF
          
          # Generate AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.plussub">

              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.MODIFY_AUDIO_SETTINGS" />

              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="PlusSub"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar"
                  android:requestLegacyExternalStorage="true">

                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:configChanges="orientation|screenSize">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Generate blue icon
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          
          # Generate settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PlusSub"
          include ':app'
          EOF
          
          # Generate build.gradle (project)
          cat > build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.20'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.2.2'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          EOF
          
          # Generate app/build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          
          android {
              namespace 'com.plussub'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.plussub"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
          }
          EOF
          
          # Generate gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          kotlin.code.style=official
          EOF
          
          # Generate gradle wrapper
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # Download gradle-wrapper.jar
          wget -q -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          
          # Create gradlew
          echo '#!/bin/sh
          DIR="$(cd "$(dirname "$0")" && pwd)"
          java -classpath "$DIR/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"' > gradlew
          chmod +x gradlew
          
          # Create empty proguard file
          touch app/proguard-rules.pro

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlusSub
          path: app/build/outputs/apk/debug/*.apk
