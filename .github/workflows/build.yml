name: Build PlusSub APK

on:
workflow_dispatch:

jobs:
build:
runs-on: ubuntu-latest

steps:
- name: Checkout
  uses: actions/checkout@v4

- name: Setup JDK
  uses: actions/setup-java@v4
  with:
    distribution: temurin
    java-version: 17

- name: Setup Android SDK
  uses: android-actions/setup-android@v3

- name: Create Android project structure
  run: |
    mkdir -p app/src/main/java/com/plussub
    mkdir -p app/src/main/res/layout
    mkdir -p app/src/main/cpp
    mkdir -p app/src/main

- name: Write AndroidManifest
  run: |
    cat <<EOF > app/src/main/AndroidManifest.xml
    <manifest xmlns:android="http://schemas.android.com/apk/res/android"
        package="com.plussub">

        <application
            android:label="PlusSub"
            android:allowBackup="true">
            <activity android:name=".MainActivity">
                <intent-filter>
                    <action android:name="android.intent.action.MAIN"/>
                    <category android:name="android.intent.category.LAUNCHER"/>
                </intent-filter>
            </activity>
        </application>

    </manifest>
    EOF

- name: Write MainActivity
  run: |
    cat <<EOF > app/src/main/java/com/plussub/MainActivity.kt
    package com.plussub

    import android.app.Activity
    import android.os.Bundle
    import android.widget.TextView

    class MainActivity : Activity() {

        external fun processAudio(input:String, output:String)

        override fun onCreate(savedInstanceState: Bundle?) {
            super.onCreate(savedInstanceState)

            val tv = TextView(this)
            tv.text = "PlusSub Bass Generator"
            setContentView(tv)
        }

        companion object {
            init {
                System.loadLibrary("plussub")
            }
        }
    }
    EOF

- name: Write C++ Bass Engine
  run: |
    cat <<EOF > app/src/main/cpp/plussub.cpp
    #include <jni.h>
    #include <math.h>

    extern "C"
    JNIEXPORT void JNICALL
    Java_com_plussub_MainActivity_processAudio(
        JNIEnv* env,
        jobject,
        jstring input,
        jstring output) {

        // Placeholder audio processing
    }
    EOF

- name: Write CMake
  run: |
    cat <<EOF > app/src/main/cpp/CMakeLists.txt
    cmake_minimum_required(VERSION 3.22)

    add_library(plussub SHARED
        plussub.cpp)

    find_library(log-lib log)

    target_link_libraries(plussub
        \${log-lib})
    EOF

- name: Write Gradle
  run: |
    cat <<EOF > build.gradle
    buildscript {
        repositories {
            google()
            mavenCentral()
        }
        dependencies {
            classpath 'com.android.tools.build:gradle:8.2.2'
        }
    }

    allprojects {
        repositories {
            google()
            mavenCentral()
        }
    }
    EOF

- name: Write App Gradle
  run: |
    cat <<EOF > app/build.gradle
    plugins {
        id 'com.android.application'
    }

    android {
        namespace "com.plussub"
        compileSdk 34

        defaultConfig {
            applicationId "com.plussub"
            minSdk 24
            targetSdk 34
            versionCode 1
            versionName "1.0"

            externalNativeBuild {
                cmake {
                    cppFlags ""
                }
            }
        }

        externalNativeBuild {
            cmake {
                path "src/main/cpp/CMakeLists.txt"
            }
        }
    }

    dependencies {
    }
    EOF

- name: Create settings.gradle
  run: |
    echo "include ':app'" > settings.gradle

- name: Generate Gradle Wrapper
  run: |
    gradle wrapper

- name: Build APK
  run: |
    ./gradlew assembleDebug

- name: Upload APK
  uses: actions/upload-artifact@v4
  with:
    name: PlusSub-APK
    path: app/build/outputs/apk/debug/app-debug.apk
