name: Build PlusSub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android project structure
        run: |
          # Create all directories
          mkdir -p app/src/main/java/com/plussub
          mkdir -p app/src/main/res/layout
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p gradle/wrapper
          
          # Copy MainActivity.kt
          cp MainActivity.kt app/src/main/java/com/plussub/MainActivity.kt
          
          # Create activity_main.xml
          cat > app/src/main/res/layout/activity_main.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <LinearLayout xmlns:android="http://schemas.android.com/apk/res/android"
              android:layout_width="match_parent"
              android:layout_height="match_parent"
              android:orientation="vertical"
              android:padding="16dp">
              
              <TextView
                  android:layout_width="wrap_content"
                  android:layout_height="wrap_content"
                  android:text="PlusSub"
                  android:textSize="32sp"
                  android:textColor="#2196F3"
                  android:layout_gravity="center_horizontal"/>
              
              <TextView
                  android:id="@+id/statusText"
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:text="Load a song"
                  android:padding="16dp"
                  android:layout_marginTop="16dp"
                  android:background="#F0F0F0"/>
              
              <ScrollView
                  android:layout_width="match_parent"
                  android:layout_height="200dp"
                  android:layout_marginTop="16dp">
                  <LinearLayout
                      android:id="@+id/gridLayout"
                      android:layout_width="match_parent"
                      android:layout_height="wrap_content"
                      android:orientation="vertical"/>
              </ScrollView>
              
              <LinearLayout
                  android:layout_width="match_parent"
                  android:layout_height="wrap_content"
                  android:orientation="horizontal"
                  android:layout_marginTop="16dp">
                  
                  <Button
                      android:id="@+id/btnLoad"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="LOAD"
                      android:backgroundTint="#2196F3"
                      android:layout_marginRight="4dp"/>
                  
                  <Button
                      android:id="@+id/btnPlay"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="PLAY"
                      android:backgroundTint="#4CAF50"
                      android:layout_marginLeft="4dp"
                      android:layout_marginRight="4dp"/>
                  
                  <Button
                      android:id="@+id/btnSave"
                      android:layout_width="0dp"
                      android:layout_height="wrap_content"
                      android:layout_weight="1"
                      android:text="SAVE"
                      android:backgroundTint="#F44336"
                      android:layout_marginLeft="4dp"/>
              </LinearLayout>
              
          </LinearLayout>
          EOF
          
          # AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.plussub">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="PlusSub"
                  android:theme="@style/Theme.AppCompat.Light.DarkActionBar">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">PlusSub</string>
          </resources>
          EOF
          
          # Create blue icon (simple blue PNG base64)
          echo "" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          
          # settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
                  gradlePluginPortal()
              }
          }
          dependencyResolutionManagement {
              repositoriesMode.set(RepositoriesMode.FAIL_ON_PROJECT_REPOS)
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PlusSub"
          include ':app'
          EOF
          
          # Project build.gradle
          cat > build.gradle << 'EOF'
          plugins {
              id 'com.android.application' version '8.2.2' apply false
              id 'org.jetbrains.kotlin.android' version '1.9.20' apply false
          }
          EOF
          
          # App build.gradle
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          
          android {
              namespace 'com.plussub'
              compileSdk 34
              
              defaultConfig {
                  applicationId "com.plussub"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              
              buildTypes {
                  release {
                      minifyEnabled false
                      proguardFiles getDefaultProguardFile('proguard-android-optimize.txt'), 'proguard-rules.pro'
                  }
              }
              
              compileOptions {
                  sourceCompatibility JavaVersion.VERSION_17
                  targetCompatibility JavaVersion.VERSION_17
              }
              
              kotlinOptions {
                  jvmTarget = '17'
              }
          }
          
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.appcompat:appcompat:1.6.1'
              implementation 'com.google.android.material:material:1.11.0'
              implementation 'androidx.constraintlayout:constraintlayout:2.1.4'
          }
          EOF
          
          # gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          kotlin.code.style=official
          EOF
          
          # Create empty proguard file
          touch app/proguard-rules.pro
          
          # Create gradle-wrapper.properties
          cat > gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

      - name: Generate gradle wrapper
        run: |
          # Download gradle-wrapper.jar
          wget -O gradle/wrapper/gradle-wrapper.jar https://github.com/gradle/gradle/raw/v8.6.0/gradle/wrapper/gradle-wrapper.jar
          
          # Create gradlew script
          cat > gradlew << 'EOF'
          #!/bin/sh
          DIR="$(cd "$(dirname "$0")" && pwd)"
          java -classpath "$DIR/gradle/wrapper/gradle-wrapper.jar" org.gradle.wrapper.GradleWrapperMain "$@"
          EOF
          
          # Create gradlew.bat
          cat > gradlew.bat << 'EOF'
          @if "%DEBUG%" == "" @echo off
          @rem Set local scope for the variables with windows NT shell
          if "%OS%"=="Windows_NT" setlocal
          set DIRNAME=%~dp0
          set CLASSPATH=%DIRNAME%gradle\wrapper\gradle-wrapper.jar
          "%JAVA_HOME%\bin\java.exe" -classpath "%CLASSPATH%" org.gradle.wrapper.GradleWrapperMain %*
          EOF
          
          # Make gradlew executable
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlusSub
          path: app/build/outputs/apk/debug/*.apk
