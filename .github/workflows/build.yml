name: Build PlusSub

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Create Android project structure
        run: |
          # Create all necessary directories
          mkdir -p app/src/main/java/com/plussub
          mkdir -p app/src/main/res/values
          mkdir -p app/src/main/res/mipmap-hdpi
          mkdir -p app/src/main/res/mipmap-xhdpi
          mkdir -p app/src/main/res/mipmap-xxhdpi
          
          # Copy your single KT file
          cp MainActivity.kt app/src/main/java/com/plussub/MainActivity.kt
          
          # Create AndroidManifest.xml
          cat > app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              package="com.plussub">
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" />
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" />
              <application
                  android:allowBackup="true"
                  android:icon="@mipmap/ic_launcher"
                  android:label="PlusSub"
                  android:theme="@style/Theme.PlusSub">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true">
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF
          
          # Create strings.xml
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <resources>
              <string name="app_name">PlusSub</string>
          </resources>
          EOF
          
          # Create blue icon (48x48 solid blue)
          echo "R0lGODlhMAAwAIAAAAAAl7sAACH5BAUAAAEALAAAAAAwADAAAgJ4jI+pywIAOw==" | base64 -d > app/src/main/res/mipmap-hdpi/ic_launcher.png
          echo "R0lGODlhyADIAAAAAACXuwAAACH5BAUAAAEALAAAAAHIAMgAAAL/hI+pywEAOw==" | base64 -d > app/src/main/res/mipmap-xhdpi/ic_launcher.png
          echo "R0lGODlhZABkAAAAAACXuwAAACH5BAUAAAEALAAAAABkAGQAAAL/jI+pywIAOw==" | base64 -d > app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          
          # Create build.gradle (app level)
          cat > app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
              id 'org.jetbrains.kotlin.android'
          }
          android {
              namespace 'com.plussub'
              compileSdk 34
              defaultConfig {
                  applicationId "com.plussub"
                  minSdk 24
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              buildFeatures {
                  compose true
              }
              composeOptions {
                  kotlinCompilerExtensionVersion '1.5.4'
              }
          }
          dependencies {
              implementation 'androidx.core:core-ktx:1.12.0'
              implementation 'androidx.lifecycle:lifecycle-runtime-ktx:2.7.0'
              implementation 'androidx.activity:activity-compose:1.8.0'
              implementation platform('androidx.compose:compose-bom:2023.10.01')
              implementation 'androidx.compose.ui:ui'
              implementation 'androidx.compose.material3:material3'
              implementation 'com.google.android.exoplayer:exoplayer-core:2.19.1'
          }
          EOF
          
          # Create project build.gradle
          cat > build.gradle << 'EOF'
          buildscript {
              ext.kotlin_version = '1.9.0'
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
                  classpath "org.jetbrains.kotlin:kotlin-gradle-plugin:$kotlin_version"
              }
          }
          EOF
          
          # Create settings.gradle
          cat > settings.gradle << 'EOF'
          pluginManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          dependencyResolutionManagement {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          rootProject.name = "PlusSub"
          include ':app'
          EOF
          
          # Create gradle.properties
          cat > gradle.properties << 'EOF'
          org.gradle.jvmargs=-Xmx2048m
          android.useAndroidX=true
          android.suppressUnsupportedCompileSdk=34
          EOF

      - name: Generate gradle wrapper
        run: |
          gradle wrapper
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: PlusSub-App
          path: app/build/outputs/apk/debug/*.apk
